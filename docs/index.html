    .card:hover { transform: translateY(-3px); box-shadow: 0 4px 16px rgba(0,0,0,.12); }
    .card-label { font-size: 1.3rem; font-weight: 700; margin-bottom: 6px; }
    .card-sub { font-size: 0.82rem; color: #6366f1; }
  </style>
</head>
