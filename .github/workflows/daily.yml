name: Generar Dashboards ZAS
on:
  schedule:
    - cron: '30 12 * * 1-5'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install openpyxl requests
      - name: Exportar campanas
        env:
          ODOO_URL:      ${{ secrets.ODOO_URL }}
          ODOO_DB:       ${{ secrets.ODOO_DB }}
          ODOO_USER:     ${{ secrets.ODOO_USER }}
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
        run: python export_campanas.py
      - name: Subir resultado como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: campanas-data
          path: /tmp/campanas_tasks.json
