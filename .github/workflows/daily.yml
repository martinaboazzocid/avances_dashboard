name: Generar Dashboards ZAS
on:
  schedule:
    - cron: '30 12 * * 1-5'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install openpyxl requests
      - name: Generar dashboards
        env:
          ODOO_URL:      ${{ secrets.ODOO_URL }}
          ODOO_DB:       ${{ secrets.ODOO_DB }}
          ODOO_USER:     ${{ secrets.ODOO_USER }}
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
          BUDGET_FILE:   Base_Regional__2_.xlsx
          OUTPUT_DIR:    docs
        run: python generar_dashboards.py --auto
      - name: Commit y push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Dashboard update $(date +'%Y-%m-%d %H:%M ART')"
          git push
